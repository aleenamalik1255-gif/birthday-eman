<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(270deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
    background-size: cover;         /* Make background cover the screen */
    background-position: center;    /* Center the image */
    background-repeat: no-repeat;   /* Avoid repeating the image */
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    transition: background-image 1s ease;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card {
    background: rgba(255, 255, 255, 0.3); /* Semi-transparent white */
    backdrop-filter: blur(8px);           /* Blur background behind card */
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    width: 380px;
    text-align: center;
    animation: float 4s ease-in-out infinite;
    color: #fff; /* Makes text more readable on images */
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
font-family:'Pacifico',cursive;
color:#ff4d6d;
font-size:32px;
}

button{
padding:12px 28px;
font-size:17px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

button:hover{
transform:scale(1.1);
background:#ff2e5f;
}

#message{
margin-top:25px;
font-size:16px;
display:none;
line-height:1.6;
color:#444;
min-height:180px;
}

/* Floating emojis */
.emoji{
position:absolute;
font-size:22px;
animation: floatEmoji 6s linear infinite;
opacity:0.8;
}

@keyframes floatEmoji{
0%{transform:translateY(100vh); opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh); opacity:0;}
}

#continueBtn{
display:none;
margin-top:15px;
padding:10px 25px;
font-size:16px;
border:none;
border-radius:10px;
background:#ff9a9e;
color:white;
cursor:pointer;
transition:0.3s;
}

#continueBtn:hover{
transform:scale(1.1);
background:#ff4d6d;
}

</style>
</head>

<body>

<!-- Floating emojis -->
<div class="emoji" style="left:10%">🎈</div>
<div class="emoji" style="left:25%">🎉</div>
<div class="emoji" style="left:40%">💖</div>
<div class="emoji" style="left:60%">🎂</div>
<div class="emoji" style="left:75%">✨</div>
<div class="emoji" style="left:90%">🎁</div>

<div class="card">

<h1>🎂 Happy Birthday Eman 🎉</h1>

<p id="specialLine">I made something special for you.</p>

<button id="surpriseBtn" onclick="startSurprise()">Click Your Surprise 🎁</button>

<div id="message"></div>
<button id="continueBtn" onclick="showNextLine()">Continue ➡️</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// Friendship lines
const lines = [
  "Even though we are in different cities now, you will always be one of the most special people in my life. 💖",
  "It’s honestly crazy to think that we have been best friends for almost 8 years, since 8th class. 🎓",
  "From being just classmates to becoming inseparable best friends, we have shared so many memories, laughs, secrets, and moments. ✨",
  "Thank you for always being there for me and understanding me like no one else does. 🤍",
  "Distance may keep us in different cities, but it can never change our friendship. 🌍",
  "You’ve always inspired me to be a better person, and I hope I do the same for you. 🌟",
  "Remember all those silly inside jokes we have? They’ll always make me smile no matter what. 😄",
  "Happy Birthday Eman 🎂❤️",
  "I hope this year brings you happiness, success, and everything you truly deserve. 🎉",
  "No matter where life takes us, our bond will remain unbreakable. 💕"
];

// Background images
const bgImages = [
  'url(IMG_1697.JPG)',
  'url(IMG_1698.JPG)',
  'url(IMG_20230515_204355_455.JPG)',
  'url(IMG_1690.JPG)',
  'url(IMG_1691.JPG)',
  'url(IMG_1692.JPG)',
  'url(IMG_1693.JPG)',
  'url(IMG_1694.JPG)',
  'url(IMG_1695.JPG)',
  'url(IMG_1696.JPG)'
];


let currentIndex = 0;

function startSurprise(){
  document.getElementById("surpriseBtn").style.display = "none";
  document.getElementById("specialLine").style.display = "none"; // Hide special line
  document.getElementById("message").style.display = "block";
  document.getElementById("continueBtn").style.display = "inline-block";

  // Confetti
  confetti({
    particleCount: 200,
    spread: 120,
    origin: {y:0.6}
  });

  showNextLine();
}

function showNextLine(){
  const msg = document.getElementById("message");
  if(currentIndex < lines.length){
    msg.innerHTML = lines[currentIndex];
    // Change background
    document.body.style.backgroundImage = bgImages[currentIndex % bgImages.length];
    currentIndex++;
  } else {
    document.getElementById("continueBtn").style.display = "none";
  }
}
</script>

</body>
</html>
