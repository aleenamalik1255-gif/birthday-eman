<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
overflow:hidden;
transition: background-image 1s ease-in-out;
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}

.card{
background: rgba(255,255,255,0.9);
padding:40px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
width:380px;
text-align:center;
animation: float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
font-family:'Pacifico',cursive;
color:#ff4d6d;
font-size:32px;
}

button{
padding:12px 28px;
font-size:17px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

button:hover{
transform:scale(1.1);
background:#ff2e5f;
}

#message{
margin-top:25px;
font-size:16px;
line-height:1.6;
color:#444;
min-height:180px;
}

/* Continue button styling */
#continueBtn{
display:none;
margin-top:15px;
padding:10px 25px;
font-size:16px;
border:none;
border-radius:10px;
background:#ff9a9e;
color:white;
cursor:pointer;
transition:0.3s;
}

#continueBtn:hover{
transform:scale(1.1);
background:#ff4d6d;
}

/* Floating emojis */
.emoji{
position:absolute;
font-size:22px;
animation: floatEmoji 6s linear infinite;
opacity:0.8;
}

@keyframes floatEmoji{
0%{transform:translateY(100vh); opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh); opacity:0;}
}

</style>
</head>

<body style="background-image: url('https://images.unsplash.com/photo-1526662091522-1935c3b1f69f?auto=format&fit=crop&w=1350&q=80');">

<!-- Floating emojis -->
<div class="emoji" style="left:10%">🎈</div>
<div class="emoji" style="left:25%">🎉</div>
<div class="emoji" style="left:40%">💖</div>
<div class="emoji" style="left:60%">🎂</div>
<div class="emoji" style="left:75%">✨</div>
<div class="emoji" style="left:90%">🎁</div>

<div class="card">

<h1>🎂 Happy Birthday Eman 🎉</h1>

<p id="specialText">I made something special for you.</p>

<button id="surpriseBtn" onclick="startSurprise()">Click Your Surprise 🎁</button>

<div id="message"></div>
<button id="continueBtn" onclick="showNextLine()">Continue ➡️</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const lines = [
"Even though we are in different cities now, you will always be one of the most special people in my life. 💖",
"It’s honestly crazy to think that we have been best friends for almost 8 years, since 8th class. 🎓",
"From being just classmates to becoming inseparable best friends, we have shared so many memories, laughs, secrets, and moments. ✨",
"Thank you for always being there for me and understanding me like no one else does. 🤍",
"Distance may keep us in different cities, but it can never change our friendship. 🌍",
"Happy Birthday Eman 🎂❤️",
"I hope this year brings you happiness, success, and everything you truly deserve. 🎉"
];

const bgImages = [
"https://images.unsplash.com/photo-1526662091522-1935c3b1f69f?auto=format&fit=crop&w=1350&q=80",
"https://images.unsplash.com/photo-1532074205216-d0e1f4dc5f18?auto=format&fit=crop&w=1350&q=80",
"https://images.unsplash.com/photo-1518609878373-06d740f60d8b?auto=format&fit=crop&w=1350&q=80",
"https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=1350&q=80",
"https://images.unsplash.com/photo-1508780709619-79562169bc64?auto=format&fit=crop&w=1350&q=80",
"https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=1350&q=80",
"https://images.unsplash.com/photo-1511988617509-a57c8a288659?auto=format&fit=crop&w=1350&q=80"
];

let currentIndex = 0;

function startSurprise(){
  // Hide button and special text
  document.getElementById("surpriseBtn").style.display = "none";
  document.getElementById("specialText").style.display = "none";

  document.getElementById("message").style.display = "block";
  document.getElementById("continueBtn").style.display = "inline-block";

  // Confetti
  confetti({
    particleCount: 200,
    spread: 120,
    origin: {y:0.6}
  });

  showNextLine();
}

function showNextLine(){
  const msg = document.getElementById("message");
  if(currentIndex < lines.length){
    msg.innerHTML = lines[currentIndex];

    // Change background image
    document.body.style.backgroundImage = `url('${bgImages[currentIndex]}')`;

    currentIndex++;
  } else {
    document.getElementById("continueBtn").style.display = "none";
  }
}

</script>

</body>
</html>
